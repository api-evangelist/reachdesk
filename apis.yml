aid: reachdesk
name: Reachdesk
description: >-
  Reachdesk is a global B2B corporate gifting and direct mail platform that
  enables sales, marketing, and customer success teams to send physical gifts,
  branded merchandise, and digital rewards at scale. The Reachdesk REST API
  allows programmatic triggering of gift campaigns, integration with CRM and
  marketing automation tools, and management of sending workflows across 180+
  countries. API tokens are generated via the platform settings and used to
  authenticate requests for campaign triggering and gift delivery operations.
